<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Web</title>
    <link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div class="pagina-container">
        <h1>Bem-vindo à Página</h1>
        <p>Esta é a página de destino após o login.</p>

        <a href="{{ url_for('home') }}" class="btn btn-primary">Voltar para Login</a>
  
    </div>

    <!-- Google login -->

<div id="g_id_onload"
data-client_id="955828976402-g6fi2ukuml5f32pott70o77gicehk9nk.apps.googleusercontent.com"
data-callback="handleCredentialResponse"
data-auto_prompt="false">
</div>


<button onclick="logout()" class="btn btn-danger w-100 mt-2">
Sair do Google
</button>

<div id="mensagem" class="mt-3 text-center"></div>

</div>

      

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

            <script>
        // 🔹 Login Google
        function handleCredentialResponse(response) {

            const data = parseJwt(response.credential);

            console.log(data);

            document.getElementById("mensagem").innerHTML =
                "Bem-vindo, " + data.name + " (" + data.email + ")";
        }

        // 🔹 Decodificar token JWT
        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(atob(base64).split('').map(function (c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            return JSON.parse(jsonPayload);
        }

        // 🔹 Logout
        function logout() {
            google.accounts.id.disableAutoSelect();
            document.getElementById("mensagem").innerHTML = "Logout realizado.";
        }
    </script>
</body>
</html>
